    - file: lint-http-rules/src/helpers/auth.rs
      line: 247
- label: RFC 7807
  url: https://www.rfc-editor.org/rfc/rfc7807.txt
  type: text/plain
  fragments:
  - label: server_problem_details_content_type
    section: § 3
    snippet: When serialized as a JSON document, that format is identified with the "application/problem+json" media type.
    cited_by:
    - file: lint-http-rules/src/rules/server_problem_details_content_type.rs
      line: 29
- label: RFC 8246
  url: https://www.rfc-editor.org/rfc/rfc8246.txt
  type: text/plain
  fragments:
  - label: server_immutable_requires_freshness
    section: § 2
    snippet: Clients SHOULD NOT issue a conditional request during the response's freshness lifetime (e.g., upon a reload) unless explicitly overridden by the user (e.g., a force reload).
    cited_by:
    - file: lint-http-rules/src/rules/server_immutable_requires_freshness.rs
      line: 97
    - file: lint-http-rules/src/rules/stateful_immutable_cache_never_stale.rs
      line: 93
  - label: server_immutable_requires_freshness (2)
    section: § 2
    snippet: The immutable extension only applies during the freshness lifetime of the stored response.
    cited_by:
    - file: lint-http-rules/src/rules/server_immutable_requires_freshness.rs
      line: 96
    - file: lint-http-rules/src/rules/stateful_immutable_cache_never_stale.rs
      line: 94
- label: RFC 8288
  url: https://www.rfc-editor.org/rfc/rfc8288.txt
  type: text/plain
  fragments:
  - label: message_link_header_validity
    section: § 3
    snippet: link-value = "<" URI-Reference ">" *( OWS ";" OWS link-param )
    cited_by:
    - file: lint-http-rules/src/rules/message_link_header_validity.rs
      line: 58
- label: RFC 9110
  url: https://www.rfc-editor.org/rfc/rfc9110.txt
  type: text/plain
  fragments:
  - label: client_accept_encoding_present
    section: § 12.5.3
    snippet: 'Accept-Encoding = #( codings [ weight ] )'
    cited_by:
    - file: lint-http-rules/src/rules/client_accept_encoding_present.rs
      line: 29
  - label: client_accept_ranges_on_partial_content
    section: § 14.3
    snippet: The "Accept-Ranges" field in a response indicates whether an upstream server supports range requests for the target resource.
    cited_by:
    - file: lint-http-rules/src/rules/client_accept_ranges_on_partial_content.rs
      line: 51
  - label: client_host_header
    section: § 7.2
    snippet: A user agent MUST generate a Host header field in a request unless it sends that information as an ":authority" pseudo-header field.
    cited_by:
    - file: lint-http-rules/src/rules/client_host_header.rs
      line: 30
  - label: lint-http-rules/src/helpers/auth.rs
    section: § 11.1
    snippet: It uses a case-insensitive token to identify the authentication scheme
    cited_by:
    - file: lint-http-rules/src/helpers/auth.rs
      line: 201
  - label: lint-http-rules/src/helpers/auth.rs (2)
    section: § 11.3
