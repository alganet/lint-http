- label: RFC 6838
  url: https://www.rfc-editor.org/rfc/rfc6838.txt
  type: text/plain
  fragments:
  - label: message_media_type_suffix_validity
    section: § 4.2.8
    snippet: Media types that make use of a named structured syntax SHOULD use the appropriate registered "+suffix" for that structured syntax
    cited_by:
    - file: lint-http-rules/src/rules/message_media_type_suffix_validity.rs
      line: 88
- label: RFC 7578
  url: https://www.rfc-editor.org/rfc/rfc7578.txt
  type: text/plain
  fragments:
  - label: message_form_data_content_disposition_valid
    section: § 4.2
    snippet: Each part MUST contain a Content-Disposition header field
    cited_by:
    - file: lint-http-rules/src/rules/message_form_data_content_disposition_valid.rs
      line: 37
- label: RFC 7616
  url: https://www.rfc-editor.org/rfc/rfc7616.txt
  type: text/plain
  fragments:
  - label: message_digest_auth_validity
    section: § 3.4
    snippet: 'For historical reasons, a sender MUST only generate the quoted string syntax for the following parameters: username, realm, nonce, uri, response, cnonce, and opaque.'
    cited_by:
    - file: lint-http-rules/src/rules/message_digest_auth_validity.rs
      line: 111
  - label: message_digest_auth_validity (2)
    section: § 3.4
    snippet: If a parameter or its value is improper, or required parameters are missing, the proper response is a 4xx error code.
    cited_by:
    - file: lint-http-rules/src/rules/message_digest_auth_validity.rs
      line: 57
- label: RFC 7617
