sources:
- label: Fetch
  url: https://fetch.spec.whatwg.org/
  type: text/html
  fragments:
  - label: client_request_origin_header_present_for_cors
    snippet: It is used for all HTTP fetches whose request’s response tainting is "cors", as well as those where request’s method is neither `GET` nor `HEAD`.
    cited_by:
    - file: lint-http-rules/src/rules/client_request_origin_header_present_for_cors.rs
      line: 32
  - label: client_request_origin_header_present_for_cors (2)
    snippet: The `Origin` request header indicates where a fetch originates from.
    cited_by:
    - file: lint-http-rules/src/rules/client_request_origin_header_present_for_cors.rs
      line: 69
  - label: message_access_control_allow_credentials_when_origin
    snippet: If credentials is `true`, then return success.
    cited_by:
    - file: lint-http-rules/src/rules/message_access_control_allow_credentials_when_origin.rs
      line: 88
  - label: message_access_control_allow_credentials_when_origin (2)
    snippet: If request’s credentials mode is not "include" and origin is `*`, then return success.
    cited_by:
    - file: lint-http-rules/src/rules/message_access_control_allow_credentials_when_origin.rs
      line: 87
    - file: lint-http-rules/src/rules/semantic_origin_matching_for_cors.rs
      line: 91
  - label: message_access_control_allow_origin_valid
    snippet: Indicates whether the response can be shared, via returning the literal value of the `Origin` request header (which can be `null`) or `*` in a response.
    cited_by:
    - file: lint-http-rules/src/rules/message_access_control_allow_origin_valid.rs
      line: 40
    - file: lint-http-rules/src/rules/semantic_origin_matching_for_cors.rs
      line: 62
  - label: semantic_origin_matching_for_cors
    snippet: If the result of byte-serializing a request origin with request is not origin, then return failure.
    cited_by:
    - file: lint-http-rules/src/rules/semantic_origin_matching_for_cors.rs
      line: 123
- label: Resource Timing
  url: https://www.w3.org/TR/resource-timing/
  type: text/html
  fragments:
  - label: message_timing_allow_origin_validity
    snippet: The sender MAY generate multiple Timing-Allow-Origin header fields.
    cited_by:
    - file: lint-http-rules/src/rules/message_timing_allow_origin_validity.rs
      line: 38
  - label: message_timing_allow_origin_validity (2)
    snippet: Timing-Allow-Origin = 1#( origin-or-null / wildcard )
    cited_by:
    - file: lint-http-rules/src/rules/message_timing_allow_origin_validity.rs
      line: 63
- label: RFC 6454
  url: https://www.rfc-editor.org/rfc/rfc6454.txt
  type: text/plain
  fragments:
  - label: lint-http-rules/src/helpers/uri.rs
    section: § 7.1
    snippet: origin-list-or-null = %x6E %x75 %x6C %x6C / origin-list
    cited_by:
    - file: lint-http-rules/src/helpers/uri.rs
      line: 94
  - label: lint-http-rules/src/helpers/uri.rs (2)
    section: § 7.1
    snippet: serialized-origin = scheme "://" host [ ":" port ]
    cited_by:
    - file: lint-http-rules/src/helpers/uri.rs
      line: 101
- label: RFC 6750
  url: https://www.rfc-editor.org/rfc/rfc6750.txt
  type: text/plain
  fragments:
  - label: lint-http-rules/src/helpers/auth.rs
    section: § 2.1
    snippet: b64token    = 1*( ALPHA / DIGIT / "-" / "." / "_" / "~" / "+" / "/" ) *"="
    cited_by:
    - file: lint-http-rules/src/helpers/auth.rs
      line: 295
    - file: lint-http-rules/src/rules/message_bearer_token_format_validity.rs
      line: 51
- label: RFC 7616
  url: https://www.rfc-editor.org/rfc/rfc7616.txt
  type: text/plain
  fragments:
  - label: message_digest_auth_validity
    section: § 3.4
    snippet: 'For historical reasons, a sender MUST only generate the quoted string syntax for the following parameters: username, realm, nonce, uri, response, cnonce, and opaque.'
    cited_by:
    - file: lint-http-rules/src/rules/message_digest_auth_validity.rs
      line: 111
  - label: message_digest_auth_validity (2)
    section: § 3.4
    snippet: If a parameter or its value is improper, or required parameters are missing, the proper response is a 4xx error code.
    cited_by:
    - file: lint-http-rules/src/rules/message_digest_auth_validity.rs
      line: 57
- label: RFC 7617
  url: https://www.rfc-editor.org/rfc/rfc7617.txt
  type: text/plain
  fragments:
  - label: lint-http-rules/src/helpers/auth.rs
    section: § 2
    snippet: The user-id and password MUST NOT contain any control characters
    cited_by:
    - file: lint-http-rules/src/helpers/auth.rs
      line: 257
  - label: lint-http-rules/src/helpers/auth.rs (2)
    section: § 2
    snippet: and obtains the basic-credentials by encoding this octet sequence using Base64
    cited_by:
    - file: lint-http-rules/src/helpers/auth.rs
      line: 239
    - file: lint-http-rules/src/rules/message_basic_auth_base64_validity.rs
      line: 40
  - label: lint-http-rules/src/helpers/auth.rs (3)
    section: § 2
    snippet: constructs the user-pass by concatenating the user-id, a single colon (":") character, and the password
    cited_by:
    - file: lint-http-rules/src/helpers/auth.rs
      line: 247
- label: RFC 9110
  url: https://www.rfc-editor.org/rfc/rfc9110.txt
  type: text/plain
  fragments:
  - label: client_host_header
    section: § 7.2
    snippet: A user agent MUST generate a Host header field in a request unless it sends that information as an ":authority" pseudo-header field.
    cited_by:
    - file: lint-http-rules/src/rules/client_host_header.rs
      line: 30
  - label: lint-http-rules/src/helpers/auth.rs
    section: § 11.1
    snippet: It uses a case-insensitive token to identify the authentication scheme
    cited_by:
    - file: lint-http-rules/src/helpers/auth.rs
      line: 201
  - label: lint-http-rules/src/helpers/auth.rs (2)
    section: § 11.3
    snippet: 'challenge = auth-scheme [ 1*SP ( token68 / #auth-param ) ]'
    cited_by:
    - file: lint-http-rules/src/helpers/auth.rs
      line: 66
  - label: lint-http-rules/src/helpers/auth.rs (3)
    section: § 11.4
    snippet: 'credentials = auth-scheme [ 1*SP ( token68 / #auth-param ) ]'
    cited_by:
    - file: lint-http-rules/src/helpers/auth.rs
      line: 210
  - label: message_auth_scheme_iana_registered
    section: § 16.4.1
    snippet: The "Hypertext Transfer Protocol (HTTP) Authentication Scheme Registry" defines the namespace for the authentication schemes in challenges and credentials.
    cited_by:
    - file: lint-http-rules/src/rules/message_auth_scheme_iana_registered.rs
      line: 95
  - label: message_authorization_credentials_present
    section: § 11.6.2
    snippet: The "Authorization" header field allows a user agent to authenticate itself with an origin server
    cited_by:
    - file: lint-http-rules/src/rules/message_authorization_credentials_present.rs
      line: 29
  - label: message_trailer_fields_validity
    section: § 6.5.1
    snippet: Many fields cannot be processed outside the header section because their evaluation is necessary prior to receiving the content, such as those that describe message framing, routing, authentication, request modifiers, response controls, or content format.
    cited_by:
    - file: lint-http-rules/src/rules/message_trailer_fields_validity.rs
      line: 14
  - label: message_www_authenticate_challenge_syntax
    section: § 11.6.1
    snippet: The "WWW-Authenticate" response header field indicates the authentication scheme(s) and parameters applicable to the target resource.
    cited_by:
    - file: lint-http-rules/src/rules/message_www_authenticate_challenge_syntax.rs
      line: 32
  - label: server_authentication_challenge_validity
    section: § 11.5
    snippet: These realms allow the protected resources on a server to be partitioned into a set of protection spaces, each with its own authentication scheme and/or authorization database.
    cited_by:
    - file: lint-http-rules/src/rules/server_authentication_challenge_validity.rs
      line: 82
  - label: stateful_authentication_failure_loop
    section: § 15.5.2
    snippet: If the 401 response contains the same challenge as the prior response, and the user agent has already attempted authentication at least once, then the user agent SHOULD present the enclosed representation to the user, since it usually contains relevant diagnostic information.
    cited_by:
    - file: lint-http-rules/src/rules/stateful_authentication_failure_loop.rs
      line: 50
- label: RFC 9112
  url: https://www.rfc-editor.org/rfc/rfc9112.txt
  type: text/plain
  fragments:
  - label: client_host_header
    section: § 3.2
    snippet: A client MUST send a Host header field (Section 7.2 of [HTTP]) in all HTTP/1.1 request messages.
    cited_by:
    - file: lint-http-rules/src/rules/client_host_header.rs
      line: 29
