sources:
- label: Fetch
  url: https://fetch.spec.whatwg.org/
  type: text/html
  fragments:
  - label: client_request_origin_header_present_for_cors
    snippet: It is used for all HTTP fetches whose request’s response tainting is "cors", as well as those where request’s method is neither `GET` nor `HEAD`.
    cited_by:
    - file: lint-http-rules/src/rules/client_request_origin_header_present_for_cors.rs
      line: 32
  - label: client_request_origin_header_present_for_cors (2)
    snippet: The `Origin` request header indicates where a fetch originates from.
    cited_by:
    - file: lint-http-rules/src/rules/client_request_origin_header_present_for_cors.rs
      line: 69
  - label: message_access_control_allow_credentials_when_origin
    snippet: If credentials is `true`, then return success.
    cited_by:
    - file: lint-http-rules/src/rules/message_access_control_allow_credentials_when_origin.rs
      line: 88
  - label: message_access_control_allow_credentials_when_origin (2)
    snippet: If request’s credentials mode is not "include" and origin is `*`, then return success.
    cited_by:
    - file: lint-http-rules/src/rules/message_access_control_allow_credentials_when_origin.rs
      line: 87
    - file: lint-http-rules/src/rules/semantic_origin_matching_for_cors.rs
      line: 91
  - label: message_access_control_allow_origin_valid
    snippet: Indicates whether the response can be shared, via returning the literal value of the `Origin` request header (which can be `null`) or `*` in a response.
    cited_by:
    - file: lint-http-rules/src/rules/message_access_control_allow_origin_valid.rs
      line: 40
    - file: lint-http-rules/src/rules/semantic_origin_matching_for_cors.rs
      line: 62
  - label: message_cross_origin_resource_policy_valid
    snippet: Cross-Origin-Resource-Policy = %s"same-origin" / %s"same-site" / %s"cross-origin" ; case-sensitive
    cited_by:
    - file: lint-http-rules/src/rules/message_cross_origin_resource_policy_valid.rs
      line: 78
  - label: message_cross_origin_resource_policy_valid (2)
    snippet: If policy is neither `same-origin`, `same-site`, nor `cross-origin`, then set policy to null.
    cited_by:
    - file: lint-http-rules/src/rules/message_cross_origin_resource_policy_valid.rs
      line: 79
  - label: message_sec_fetch_dest_value_valid
    snippet: 'A destination type is one of: the empty string, "audio", "audioworklet", "document", "embed", "font", "frame", "iframe", "image", "json", "manifest", "object", "paintworklet", "report", "script", "serviceworker", "sharedworker", "style", "text", "track", "video", "webidentity", "worker", or "xslt".'
    cited_by:
    - file: lint-http-rules/src/rules/message_sec_fetch_dest_value_valid.rs
      line: 84
  - label: semantic_origin_matching_for_cors
    snippet: If the result of byte-serializing a request origin with request is not origin, then return failure.
    cited_by:
    - file: lint-http-rules/src/rules/semantic_origin_matching_for_cors.rs
      line: 123
  - label: server_x_content_type_options
    snippet: The `X-Content-Type-Options` response header can be used to require checking of a response’s `Content-Type` header against the destination of a request.
    cited_by:
    - file: lint-http-rules/src/rules/server_x_content_type_options.rs
      line: 96
- label: HTML
  url: https://html.spec.whatwg.org/multipage/browsers.html
  type: text/html
  fragments:
  - label: message_cross_origin_embedder_policy_valid
    snippet: An embedder policy value is one of three strings that controls the fetching of cross-origin resources without explicit permission from resource owners.
    cited_by:
    - file: lint-http-rules/src/rules/message_cross_origin_embedder_policy_valid.rs
      line: 78
  - label: message_cross_origin_opener_policy_valid
    snippet: 'The possible values are: "unsafe-none"This is the (current) default and means that the document will occupy the same top-level browsing context as its predecessor, unless that document specified a different opener policy.'
    cited_by:
    - file: lint-http-rules/src/rules/message_cross_origin_opener_policy_valid.rs
      line: 73
- label: HTML Speculative Loading
  url: https://html.spec.whatwg.org/multipage/speculative-loading.html
  type: text/html
  fragments:
  - label: message_content_security_policy_and_frame_options_consistency
    snippet: The `X-Frame-Options` HTTP response header is a way of controlling whether and how a Document may be loaded inside of a child navigable.
    cited_by:
    - file: lint-http-rules/src/rules/message_content_security_policy_and_frame_options_consistency.rs
      line: 97
  - label: message_refresh_header_syntax_valid
    snippet: The `Refresh` HTTP response header is the HTTP-equivalent to a meta element with an http-equiv attribute in the Refresh state.
    cited_by:
    - file: lint-http-rules/src/rules/message_refresh_header_syntax_valid.rs
      line: 44
- label: CSP3
  url: https://www.w3.org/TR/CSP3/
  type: text/html
  fragments:
  - label: message_content_security_policy_and_frame_options_consistency
    snippet: The frame-ancestors directive restricts the URLs which can embed the resource using frame, iframe, object, or embed.
    cited_by:
    - file: lint-http-rules/src/rules/message_content_security_policy_and_frame_options_consistency.rs
      line: 96
  - label: server_content_security_policy_validity
    snippet: serialized-directive = directive-name [ required-ascii-whitespace directive-value ] directive-name = 1*( ALPHA / DIGIT / "-" )
    cited_by:
    - file: lint-http-rules/src/rules/server_content_security_policy_validity.rs
      line: 80
- label: Clear-Site-Data
  url: https://www.w3.org/TR/clear-site-data/
  type: text/html
  fragments:
  - label: server_clear_site_data
    snippet: The Clear-Site-Data HTTP response header field sends a signal to the user agent that it ought to remove all data of a certain set of types.
    cited_by:
    - file: lint-http-rules/src/rules/server_clear_site_data.rs
      line: 124
- label: Fetch Metadata
  url: https://www.w3.org/TR/fetch-metadata/
  type: text/html
  fragments:
  - label: message_sec_fetch_dest_value_valid
    snippet: Valid Sec-Fetch-Dest values include the set of valid request destinations defined by [Fetch].
    cited_by:
    - file: lint-http-rules/src/rules/message_sec_fetch_dest_value_valid.rs
      line: 83
  - label: message_sec_fetch_mode_value_valid
    snippet: Valid Sec-Fetch-Mode values include "cors", "navigate", "no-cors", "same-origin", and "websocket".
    cited_by:
    - file: lint-http-rules/src/rules/message_sec_fetch_mode_value_valid.rs
      line: 77
  - label: message_sec_fetch_site_value_valid
    snippet: Valid Sec-Fetch-Site values include "cross-site", "same-origin", "same-site", and "none".
    cited_by:
    - file: lint-http-rules/src/rules/message_sec_fetch_site_value_valid.rs
      line: 77
  - label: message_sec_fetch_user_value_valid
    snippet: 'Sec-Fetch-User = sf-boolean Note: The header is delivered only for navigation requests, and only when its value is true.'
    cited_by:
    - file: lint-http-rules/src/rules/message_sec_fetch_user_value_valid.rs
      line: 66
- label: Resource Timing
  url: https://www.w3.org/TR/resource-timing/
  type: text/html
  fragments:
  - label: message_timing_allow_origin_validity
    snippet: The sender MAY generate multiple Timing-Allow-Origin header fields.
    cited_by:
    - file: lint-http-rules/src/rules/message_timing_allow_origin_validity.rs
      line: 38
  - label: message_timing_allow_origin_validity (2)
    snippet: Timing-Allow-Origin = 1#( origin-or-null / wildcard )
    cited_by:
    - file: lint-http-rules/src/rules/message_timing_allow_origin_validity.rs
      line: 63
- label: Server Timing
  url: https://www.w3.org/TR/server-timing/
  type: text/html
  fragments:
  - label: server_server_timing_header_syntax
    snippet: 'Server-Timing = #server-timing-metric server-timing-metric = metric-name *( OWS ";" OWS server-timing-param ) metric-name = token'
    cited_by:
    - file: lint-http-rules/src/rules/server_server_timing_header_syntax.rs
      line: 55
- label: Permissions Policy
  url: https://w3c.github.io/webappsec-permissions-policy/
  type: text/html
  fragments:
  - label: message_permissions_policy_directives_valid
    snippet: The `Permissions-Policy` HTTP header field can be used in the response (server to client) to communicate the permissions policy that should be enforced by the client.
    cited_by:
    - file: lint-http-rules/src/rules/message_permissions_policy_directives_valid.rs
      line: 51
- label: draft-ietf-httpbis-rfc6265bis
  url: https://datatracker.ietf.org/doc/html/draft-ietf-httpbis-rfc6265bis
  type: text/html
  fragments:
  - label: message_cookie_attribute_consistency
    snippet: If the cookie's "same-site-flag" is "None", abort this algorithm and ignore the cookie entirely unless the cookie's secure-only-flag is true.
    cited_by:
    - file: lint-http-rules/src/rules/message_cookie_attribute_consistency.rs
      line: 259
  - label: message_cookie_attribute_consistency (2)
    snippet: samesite-value = "Strict" / "Lax" / "None"
    cited_by:
    - file: lint-http-rules/src/rules/message_cookie_attribute_consistency.rs
      line: 125
  - label: stateful_cookie_same_site_enforcement
    snippet: If the "SameSite" attribute's value is "Strict", the cookie will only be sent along with "same-site" requests.
    cited_by:
    - file: lint-http-rules/src/rules/stateful_cookie_same_site_enforcement.rs
      line: 128
  - label: stateful_cookie_same_site_enforcement (2)
    snippet: If the value is "Lax", the cookie will be sent with same-site requests, and with "cross-site" top-level navigations, as described in Section 5.6.7.1.
    cited_by:
    - file: lint-http-rules/src/rules/stateful_cookie_same_site_enforcement.rs
      line: 142
- label: MDN Content-Type
  url: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers/Content-Type
  fragments:
  - label: server_charset_specification
    snippet: Indicates the character encoding standard used. The value is case insensitive but lowercase is preferred.
    cited_by:
    - file: lint-http-rules/src/rules/server_charset_specification.rs
      line: 47
- label: MDN X-XSS-Protection
  url: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers/X-XSS-Protection
  fragments:
  - label: server_x_xss_protection_value_valid
    snippet: Even though this feature can protect users of older web browsers that don't support CSP, in some cases, X-XSS-Protection can create XSS vulnerabilities in otherwise safe websites.
    cited_by:
    - file: lint-http-rules/src/rules/server_x_xss_protection_value_valid.rs
      line: 58
- label: Origin Isolation Explainer
  url: https://github.com/davidben/origin-isolation/blob/master/README.md
  type: text/html
  fragments:
  - label: message_origin_isolated_header_validity
    snippet: boolean "true" value ?1, indicates that any documents derived from that origin should be separated from other cross-origin documents
    cited_by:
    - file: lint-http-rules/src/rules/message_origin_isolated_header_validity.rs
      line: 67
- label: RFC 1035
  url: https://www.rfc-editor.org/rfc/rfc1035.txt
  type: text/plain
  fragments:
  - label: lint-http-rules/src/helpers/domain.rs
    section: § 2.3.1
    snippet: Labels must be 63 characters or less.
    cited_by:
    - file: lint-http-rules/src/helpers/domain.rs
      line: 55
  - label: lint-http-rules/src/helpers/domain.rs (2)
    section: § 2.3.1
    snippet: end with a letter or digit, and have as interior characters only letters, digits, and hyphen.
    cited_by:
    - file: lint-http-rules/src/helpers/domain.rs
      line: 66
  - label: lint-http-rules/src/helpers/domain.rs (3)
    section: § 2.3.4
    snippet: names 255 octets or less
    cited_by:
    - file: lint-http-rules/src/helpers/domain.rs
      line: 46
- label: RFC 1123
  url: https://www.rfc-editor.org/rfc/rfc1123.txt
  type: text/plain
  fragments:
  - label: lint-http-rules/src/helpers/domain.rs
    section: § 2.1
    snippet: the restriction on the first character is relaxed to allow either a letter or a digit.
    cited_by:
    - file: lint-http-rules/src/helpers/domain.rs
      line: 67
- label: RFC 2045
  url: https://www.rfc-editor.org/rfc/rfc2045.txt
  type: text/plain
  fragments:
  - label: message_content_transfer_encoding_valid
    section: § 6.1
    snippet: mechanism := "7bit" / "8bit" / "binary" / "quoted-printable" / "base64" / ietf-token / x-token
    cited_by:
    - file: lint-http-rules/src/rules/message_content_transfer_encoding_valid.rs
      line: 42
- label: RFC 2046
  url: https://www.rfc-editor.org/rfc/rfc2046.txt
  type: text/plain
  fragments:
  - label: message_multipart_boundary_syntax
    section: § 5.1.1
    snippet: The Content-Type field for multipart entities requires one parameter, "boundary".
    cited_by:
    - file: lint-http-rules/src/rules/message_multipart_boundary_syntax.rs
      line: 27
    - file: lint-http-rules/src/rules/message_multipart_content_type_and_body_consistency.rs
      line: 27
  - label: message_multipart_boundary_syntax (2)
    section: § 5.1.1
    snippet: boundary := 0*69<bchars> bcharsnospace
    cited_by:
    - file: lint-http-rules/src/rules/message_multipart_boundary_syntax.rs
      line: 28
- label: RFC 3986
  url: https://www.rfc-editor.org/rfc/rfc3986.txt
  type: text/plain
  fragments:
  - label: client_request_target_no_fragment
    section: § 3.5
    snippet: The fragment identifier component of a URI allows indirect identification of a secondary resource
    cited_by:
    - file: lint-http-rules/src/rules/client_request_target_no_fragment.rs
      line: 26
  - label: client_request_uri_percent_encoding_valid
    section: § 2.1
    snippet: A percent-encoding mechanism is used to represent a data octet in a component when that octet's corresponding character is outside the allowed set or is being used as a delimiter of, or within, the component.
    cited_by:
    - file: lint-http-rules/src/rules/client_request_uri_percent_encoding_valid.rs
      line: 27
  - label: lint-http-rules/src/helpers/ipv6.rs
    section: § 3.2.2
    snippet: A host identified by an Internet Protocol literal address, version 6 [RFC3513] or later, is distinguished by enclosing the IP literal within square brackets ("[" and "]").
    cited_by:
    - file: lint-http-rules/src/helpers/ipv6.rs
      line: 26
    - file: lint-http-rules/src/helpers/ipv6.rs
      line: 77
  - label: lint-http-rules/src/helpers/ipv6.rs (2)
    section: § 3.2.2
    snippet: This is the only place where square bracket characters are allowed in the URI syntax.
    cited_by:
    - file: lint-http-rules/src/helpers/ipv6.rs
      line: 78
  - label: message_http3_host_authority_consistency
    section: § 3.2.2
    snippet: Although host is case-insensitive, producers and normalizers should use lowercase for registered names and hexadecimal addresses for the sake of uniformity
    cited_by:
    - file: lint-http-rules/src/rules/message_http3_host_authority_consistency.rs
      line: 67
- label: RFC 4648
  url: https://www.rfc-editor.org/rfc/rfc4648.txt
  type: text/plain
  fragments:
  - label: base64 rejects non-alphabet
    section: § 3.3
    snippet: Implementations MUST reject the encoded data if it contains characters outside the base alphabet when interpreting base-encoded data, unless the specification referring to this document explicitly states otherwise.
    cited_by:
    - file: lint-http-rules/src/helpers/auth.rs
      line: 242
    - file: lint-http-rules/src/helpers/websocket.rs
      line: 39
    - file: lint-http-rules/src/rules/client_sec_websocket_headers_consistency.rs
      line: 106
- label: RFC 5322
  url: https://www.rfc-editor.org/rfc/rfc5322.txt
  type: text/plain
  fragments:
  - label: lint-http-rules/src/helpers/headers.rs
    section: § 3.4
    snippet: 'Normally, a mailbox is composed of two parts: (1) an optional display name that indicates the name of the recipient (which can be a person or a system) that could be displayed to the user of a mail application, and (2) an addr-spec address enclosed in angle brackets'
    cited_by:
    - file: lint-http-rules/src/helpers/headers.rs
      line: 1168
  - label: lint-http-rules/src/helpers/headers.rs (2)
    section: § 3.4
    snippet: There is an alternate simple form of a mailbox where the addr-spec address appears alone, without the recipient's name or the angle brackets.
    cited_by:
    - file: lint-http-rules/src/helpers/headers.rs
      line: 1181
  - label: lint-http-rules/src/helpers/headers.rs (3)
    section: § 3.4.1
    snippet: An addr-spec is a specific Internet identifier that contains a locally interpreted string followed by the at-sign character ("@", ASCII value 64) followed by an Internet domain.
    cited_by:
    - file: lint-http-rules/src/helpers/headers.rs
      line: 1199
  - label: lint-http-rules/src/helpers/headers.rs (4)
    section: § 3.4.1
    snippet: The locally interpreted string is either a quoted-string or a dot-atom.
    cited_by:
    - file: lint-http-rules/src/helpers/headers.rs
      line: 1202
- label: RFC 5646
  url: https://www.rfc-editor.org/rfc/rfc5646.txt
  type: text/plain
  fragments:
  - label: lint-http-rules/src/helpers/language.rs
    section: § 2.1
    snippet: A language tag is composed from a sequence of one or more "subtags", each of which refines or narrows the range of language identified by the overall tag.
    cited_by:
    - file: lint-http-rules/src/helpers/language.rs
      line: 51
  - label: lint-http-rules/src/helpers/language.rs (2)
    section: § 2.1
    snippet: All subtags have a maximum length of eight characters.
    cited_by:
    - file: lint-http-rules/src/helpers/language.rs
      line: 60
  - label: lint-http-rules/src/helpers/language.rs (3)
    section: § 2.1
    snippet: Subtags, in turn, are a sequence of alphanumeric characters (letters and digits), distinguished and separated from other subtags in a tag by a hyphen ("-", [Unicode] U+002D).
    cited_by:
    - file: lint-http-rules/src/helpers/language.rs
      line: 37
  - label: lint-http-rules/src/helpers/language.rs (4)
    section: § 2.1
    snippet: Whitespace is not permitted in a language tag.
    cited_by:
    - file: lint-http-rules/src/helpers/language.rs
      line: 31
- label: RFC 5789
  url: https://www.rfc-editor.org/rfc/rfc5789.txt
  type: text/plain
  fragments:
  - label: client_patch_method_content_type_match
    section: § 3.1
    snippet: This specification introduces a new response header Accept-Patch used to specify the patch document formats accepted by the server.
    cited_by:
    - file: lint-http-rules/src/rules/client_patch_method_content_type_match.rs
      line: 41
    - file: lint-http-rules/src/rules/server_patch_accept_patch_header.rs
      line: 37
  - label: semantic_patch_partial_update
    section: § 2
    snippet: The PATCH method requests that a set of changes described in the request entity be applied to the resource
    cited_by:
    - file: lint-http-rules/src/rules/semantic_patch_partial_update.rs
      line: 31
- label: RFC 6265
  url: https://www.rfc-editor.org/rfc/rfc6265.txt
  type: text/plain
  fragments:
  - label: cookie domain-match
    section: § 5.1.3
    snippet: A string domain-matches a given domain string if at least one of the following conditions hold
    cited_by:
    - file: lint-http-rules/src/helpers/cookie.rs
      line: 93
    - file: lint-http-rules/src/rules/stateful_cookie_domain_matching.rs
      line: 96
  - label: cookie path-match
    section: § 5.1.4
    snippet: A request-path path-matches a given cookie-path if at least one of the following conditions holds
    cited_by:
    - file: lint-http-rules/src/helpers/cookie.rs
      line: 106
    - file: lint-http-rules/src/rules/stateful_cookie_domain_matching.rs
      line: 108
  - label: lint-http-rules/src/helpers/cookie.rs
    section: § 5.1.4
    snippet: If the uri-path contains no more than one %x2F ("/") character, output %x2F ("/") and skip the remaining step.
    cited_by:
    - file: lint-http-rules/src/helpers/cookie.rs
      line: 240
  - label: lint-http-rules/src/helpers/cookie.rs (2)
    section: § 5.1.4
    snippet: Output the characters of the uri-path from the first character up to, but not including, the right-most %x2F ("/").
    cited_by:
    - file: lint-http-rules/src/helpers/cookie.rs
      line: 245
  - label: lint-http-rules/src/helpers/cookie.rs (3)
    section: § 5.1.4
    snippet: 'The user agent MUST use an algorithm equivalent to the following algorithm to compute the default-path of a cookie:'
    cited_by:
    - file: lint-http-rules/src/helpers/cookie.rs
      line: 230
  - label: lint-http-rules/src/helpers/cookie.rs (4)
    section: § 5.1.4
    snippet: output %x2F ("/") and skip the remaining steps.
    cited_by:
    - file: lint-http-rules/src/helpers/cookie.rs
      line: 236
  - label: cookie Path attribute
    section: § 5.2.4
    snippet: 'If the attribute-value is empty or if the first character of the attribute-value is not %x2F ("/"):'
    cited_by:
    - file: lint-http-rules/src/helpers/cookie.rs
      line: 174
    - file: lint-http-rules/src/rules/message_cookie_path_validity.rs
      line: 56
  - label: message_cookie_attribute_consistency
    section: § 4.1.1
    snippet: cookie-pair       = cookie-name "=" cookie-value cookie-name       = token
    cited_by:
    - file: lint-http-rules/src/rules/message_cookie_attribute_consistency.rs
      line: 62
  - label: message_cookie_attribute_consistency (2)
    section: § 4.1.1
    snippet: expires-av        = "Expires=" sane-cookie-date
    cited_by:
    - file: lint-http-rules/src/rules/message_cookie_attribute_consistency.rs
      line: 183
  - label: message_cookie_attribute_consistency (3)
    section: § 4.1.1
    snippet: httponly-av       = "HttpOnly"
    cited_by:
    - file: lint-http-rules/src/rules/message_cookie_attribute_consistency.rs
      line: 102
  - label: message_cookie_attribute_consistency (4)
    section: § 4.1.1
    snippet: secure-av         = "Secure"
    cited_by:
    - file: lint-http-rules/src/rules/message_cookie_attribute_consistency.rs
      line: 89
  - label: message_cookie_attribute_consistency (5)
    section: § 5.2.2
    snippet: If the first character of the attribute-value is not a DIGIT or a "-" character, ignore the cookie-av.
    cited_by:
    - file: lint-http-rules/src/rules/message_cookie_attribute_consistency.rs
      line: 156
  - label: message_cookie_domain_validity
    section: § 5.2.3
    snippet: If the attribute-value is empty, the behavior is undefined.
    cited_by:
    - file: lint-http-rules/src/rules/message_cookie_domain_validity.rs
      line: 50
  - label: stateful_cookie_lifecycle
    section: § 4.1.2.5
    snippet: The Secure attribute limits the scope of the cookie to "secure" channels
    cited_by:
    - file: lint-http-rules/src/rules/stateful_cookie_lifecycle.rs
      line: 124
